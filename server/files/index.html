<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>

        body {
            font-family: sans-serif;
        }

        h1 {
            font-weight: bold;
            margin: 20px 10px 30px 10px;
            text-align: center;
        }

        article {
            border: 1px solid black;
            padding: 10px;
            border-radius: 8px;
            background-color: #e0e0e0;
            box-shadow: 4px 6px 12px rgba(0, 0, 0, 1);
            width: 100%;
            max-width: none;
            margin: 20px 0;
            box-sizing: border-box; 
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
        }

        li {
            background-color: lightgray;
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 5px;
        }

        h2 {
            color: darkblue;
        }

        .genre {
            background-color: #ffd700;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid #daaa00;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }

        img:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        p {
            font-family:"Brush Script MT", cursive;
            font-size: 1.5rem;
            
        }

    </style>
    
</head>

<body>
    <h1>My movie recommendations</h1>

    <script>
        fetch('/movies')
            .then(response => response.json())
            .then(movies => {
                const body = document.querySelector("body");

                movies.forEach(movie => {
                    const article = document.createElement('article');

                    const title = document.createElement('h2');
                    title.textContent = movie.Title;
                    article.appendChild(title);

                    const poster = document.createElement('img');
                    poster.src = movie.Poster;
                    poster.alt = `Poster for ${movie.Title}`;
                    article.appendChild(poster);

                    const info = document.createElement('div');
                    info.innerHTML = `
                        <p><strong>Released:</strong> ${movie.Released}</p>
                        <p><strong>Runtime:</strong> ${movie.Runtime} min</p>
                        <p><strong>IMDb Rating:</strong> ${movie.imdbRating} | <strong>Metascore:</strong> ${movie.Metascore}</p>
                    `;
                    article.appendChild(info);

                    const genreContainer = document.createElement('div');
                    movie.Genres.forEach(genre => {
                        const genreSpan = document.createElement('span');
                        genreSpan.textContent = genre;
                        genreSpan.classList.add('genre');
                        genreContainer.appendChild(genreSpan);
                    });
                    article.appendChild(genreContainer);

                    const createListSection = (label, dataArray) => {
                        const header = document.createElement('h4');
                        header.textContent = label + ":";
                        article.appendChild(header);

                        const ul = document.createElement('ul');
                        dataArray.forEach(item => {
                            const li = document.createElement('li');
                            li.textContent = item;
                            ul.appendChild(li);
                        });
                        article.appendChild(ul);
                    };

                    createListSection("Directors", movie.Directors);
                    createListSection("Writers", movie.Writers);
                    createListSection("Actors", movie.Actors);

                    const plotHeader = document.createElement('h4');
                    plotHeader.textContent = "Plot:";
                    article.appendChild(plotHeader);

                    const plot = document.createElement('p');
                    plot.textContent = movie.Plot;
                    article.appendChild(plot);
                    
                    body.appendChild(article);
                });
            });
    </script>
</body>

</html>
